<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;

background:#f6c7d1;
overflow:hidden;
}
.invite-card{
width:90%;
max-width:420px;
height:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
border-radius:20px;
}
h1{
color:white;
text-shadow:2px 2px 10px black;
text-align:center;
}

.container{
display:flex;
gap:40px;
margin-top:30px;
flex-wrap:wrap;
justify-content:center;
}

canvas{
border-radius:50%;
cursor:pointer;
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.message{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
width:80%;
max-width:300px;
}

button{
margin-top:10px;
padding:8px 16px;
border:none;
background:#ff4d6d;
color:white;
border-radius:8px;
cursor:pointer;
}

/* floating hearts */

.heart{
position:absolute;
color:#ff4d6d;
font-size:24px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* mobile */

@media(max-width:600px){

canvas{
width:150px;
height:150px;
}

h1{
font-size:24px;
}

}

</style>
</head>

<body>

<h1>Scratch the Hearts ❤️</h1>
<img src="bg1.jpg" class="invite-card">
<div class="container">
<canvas id="card1" width="200" height="200"></canvas>
<canvas id="card2" width="200" height="200"></canvas>
</div>

<div id="popup" class="popup">
<div class="message">

<h2>🎁 Surprise!</h2>

<p>You found a bonus card!</p>

<p>But the real invite is on the other heart 😉</p>

<button onclick="closePopup()">Close</button>

</div>
</div>

<script>

/* floating hearts */

function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
heart.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);
}

setInterval(createHeart,500);


/* scratch cards */

function createScratchCard(canvasId, link=false){

let canvas=document.getElementById(canvasId);
let ctx=canvas.getContext("2d");

let scratching=false;

/* draw heart */

ctx.fillStyle="red";
ctx.beginPath();
ctx.moveTo(100,180);
ctx.bezierCurveTo(200,120,200,40,100,80);
ctx.bezierCurveTo(0,40,0,120,100,180);
ctx.fill();

ctx.globalCompositeOperation="destination-out";

/* start */

canvas.addEventListener("mousedown",()=>scratching=true);
canvas.addEventListener("touchstart",()=>scratching=true);

/* end */

canvas.addEventListener("mouseup",()=>{scratching=false;check();});
canvas.addEventListener("touchend",()=>{scratching=false;check();});

/* scratch */

canvas.addEventListener("mousemove",scratch);
canvas.addEventListener("touchmove",scratch);

function scratch(e){

if(!scratching) return;

let rect=canvas.getBoundingClientRect();
let x,y;

if(e.touches){
x=e.touches[0].clientX-rect.left;
y=e.touches[0].clientY-rect.top;
}else{
x=e.clientX-rect.left;
y=e.clientY-rect.top;
}

ctx.beginPath();
ctx.arc(x,y,20,0,Math.PI*2);
ctx.fill();

}

/* check scratched */

function check(){

let pixels=ctx.getImageData(0,0,canvas.width,canvas.height);
let total=pixels.data.length/4;
let count=0;

for(let i=3;i<pixels.data.length;i+=4){
if(pixels.data[i]==0) count++;
}

if(count/total>0.4){

if(link){
window.location.href="invite.html";
}else{
showPopup();
}

}

}

}

createScratchCard("card1");
createScratchCard("card2",true);

function showPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>

</html>
